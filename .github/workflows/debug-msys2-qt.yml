name: Debug MSYS2 Qt Packages

on:
  workflow_dispatch:
  push:
    paths:
      - 'generic/stopspamplugin/**'
      - '.github/workflows/debug-msys2-qt.yml'
  pull_request:
    paths:
      - 'generic/stopspamplugin/**'
      - '.github/workflows/debug-msys2-qt.yml'

jobs:
  debug-msys2-qt:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install base MSYS2 packages
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-i686-cmake mingw-w64-i686-gcc
        # Не устанавливаем Qt, чтобы не получить ошибку

      - name: List available Qt packages (mingw-w64-i686)
        shell: msys2 {0}
        env:
          MSYSTEM: MINGW32
        run: |
          echo "==== mingw-w64-i686-qt* ===="
          pacman -Ss mingw-w64-i686-qt
          echo "==== mingw-w64-i686-qt5* ===="
          pacman -Ss mingw-w64-i686-qt5

      - name: List available Qt packages (mingw-w64-x86_64)
        shell: msys2 {0}
        env:
          MSYSTEM: MINGW64
        run: |
          echo "==== mingw-w64-x86_64-qt* ===="
          pacman -Ss mingw-w64-x86_64-qt
          echo "==== mingw-w64-x86_64-qt5* ===="
          pacman -Ss mingw-w64-x86_64-qt5
