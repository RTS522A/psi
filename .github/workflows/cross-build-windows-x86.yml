name: Cross-build StopSpamPlugin for Windows x86 (specific commit, with API headers)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/cross-build-windows-x86.yml'

jobs:
  cross-build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone psi-im/plugins and checkout specific commit
        run: |
          git clone https://github.com/psi-im/plugins.git
          cd plugins
          git checkout ce031b193992c574ad3e31a0026b363e1f8fc136

      - name: Clone psi-im (for dev headers/libs)
        run: |
          git clone https://github.com/psi-im/psi.git
          cd psi
          git checkout 1.5 # замените на нужную версию

      - name: Install cross toolchain and cmake
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake

      - name: Build stopspamplugin (cross x86)
        run: |
          export PsiPluginsApi_DIR=$PWD/psi/plugins/api
          export PsiPluginsApi_INCLUDE_DIR=$PWD/psi/plugins/api
          cd plugins/generic/stopspamplugin
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DPsiPluginsApi_DIR=$PsiPluginsApi_DIR \
            -DPsiPluginsApi_INCLUDE_DIR=$PsiPluginsApi_INCLUDE_DIR \
            -G "Unix Makefiles"
          make

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stopspamplugin-cross-x86
          path: plugins/generic/stopspamplugin/build/*.dll
