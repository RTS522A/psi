name: Build stopspamplugin for Windows (MXE)

on:
  workflow_dispatch:
  push:
    paths:
      - 'generic/stopspamplugin/**'
      - '.github/workflows/build-stopspamplugin-windows.yml'
  pull_request:
    paths:
      - 'generic/stopspamplugin/**'
      - '.github/workflows/build-stopspamplugin-windows.yml'

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Install MXE toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mxe
          # альтернативный способ, если пакет недоступен:
          # git clone https://github.com/mxe/mxe.git
          # cd mxe
          # make gcc cmake qt5

      - name: Checkout plugins repo at specific commit
        uses: actions/checkout@v3
        with:
          repository: psi-im/plugins
          ref: ce031b193992c574ad3e31a0026b363e1f8fc136

      - name: Checkout psi repo for dev headers (if needed)
        run: |
          git clone https://github.com/psi-im/psi.git
          cd psi
          git checkout v0.16

      - name: Build stopspamplugin for Windows using MXE
        env:
          TARGET: windows64
          BUILD_DEV_PLUGINS: OFF
        run: |
          # Сборочный скрипт как в README и build-for-windows.sh
          cd tests/travis-ci
          ./build-for-windows.sh
          # Артефакт будет лежать в builddir/generic/stopspamplugin/<DLL-файл>
          ls ../builddir/generic/stopspamplugin

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: stopspamplugin-windows
          path: builddir/generic/stopspamplugin/*.dll
