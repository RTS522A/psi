name: Build StopSpamPlugin (Windows x86)

on:
  workflow_dispatch:
  push:
    paths:
      - 'generic/stopspamplugin/**'
      - '.github/workflows/build-stopspamplugin-windows-x86.yml'
  pull_request:
    paths:
      - 'generic/stopspamplugin/**'
      - '.github/workflows/build-stopspamplugin-windows-x86.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install MSYS2 with Qt5, GCC, CMake (i686)
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-i686-qt5-base mingw-w64-i686-gcc mingw-w64-i686-cmake

      - name: Build stopspamplugin (MSYS2 x86)
        shell: msys2 {0}
        working-directory: ${{ github.workspace }}/generic/stopspamplugin
        run: |
          mkdir -p build
          cd build
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          mingw32-make

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stopspamplugin-windows-x86
          path: ${{ github.workspace }}/generic/stopspamplugin/build/*.dll
